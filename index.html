<link rel="manifest" href="manifest.json">

<style>
/* ─── 리셋 & 기본 ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF8F0;
  --card-bg: #FFFFFF;
  --primary: #FF8C6B;
  --primary-light: #FFD4C4;
  --secondary: #7EC8E3;
  --secondary-light: #D4F0FF;
  --accent: #FFD93D;
  --text: #4A3728;
  --text-light: #8B7355;
  --disabled: #D5D0CB;
  --shadow: 0 1px 4px rgba(74,55,40,0.10);
  --shadow-active: 0 1px 2px rgba(74,55,40,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}

html {
  font-size: 15px;
  overflow-x: hidden;
}

body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}

/* ─── 레이아웃 ─────────────────────────────────── */
.app {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  padding: 8px 6px 100px;
  padding-left: max(6px, env(safe-area-inset-left));
  padding-right: max(6px, env(safe-area-inset-right));
}

/* ─── 헤더 ─────────────────────────────────────── */
.header {
  text-align: center;
  padding: 6px 0;
}
.header h1 {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.5px;
}
.header h1 span { color: var(--secondary); }

/* ─── 카테고리 탭 ──────────────────────────────── */
.tabs {
  display: flex;
  gap: 6px;
  margin: 6px 0;
}
.tab-btn {
  flex: 1;
  padding: 8px 0;
  border: 2px solid var(--disabled);
  border-radius: var(--radius);
  background: var(--card-bg);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active-musical {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  box-shadow: var(--shadow);
}
.tab-btn.active-narration {
  border-color: var(--secondary);
  background: var(--secondary-light);
  color: #3A9CC0;
  box-shadow: var(--shadow);
}

/* ─── 플레이어 영역 ────────────────────────────── */
.player-bar {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 8px 10px 6px;
  margin-bottom: 6px;
}
.player-info {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  min-height: 32px;
}
.player-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 0.8rem;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
}
.player-badge.musical { background: var(--primary); }
.player-badge.narration { background: var(--secondary); }
.player-meta { flex: 1; min-width: 0; }
.player-category {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--text-light);
  letter-spacing: 0.5px;
}
.player-title {
  font-size: 0.9rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-placeholder {
  font-size: 0.8rem;
  color: var(--text-light);
}

audio {
  width: 100%;
  height: 32px;
  border-radius: 6px;
  outline: none;
}

/* ─── 컨트롤 버튼 (반복/랜덤) ──────────────────── */
.controls {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}
.ctrl-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 7px 0;
  border: 2px solid var(--disabled);
  border-radius: var(--radius-sm);
  background: var(--card-bg);
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.2s;
}
.ctrl-btn svg {
  width: 16px;
  height: 16px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}
.ctrl-btn.on {
  border-color: var(--accent);
  background: #FFF9E0;
  color: #B8860B;
}

/* ─── 책 번호 그리드 ───────────────────────────── */
.book-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  width: 100%;
}

.book-btn {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5px 2px 4px;
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  background: var(--card-bg);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-user-select: none;
  user-select: none;
  min-height: 44px;
  min-width: 0;
  overflow: hidden;
}
.book-btn:active {
  transform: scale(0.93);
  box-shadow: var(--shadow-active);
}
.book-num {
  font-size: 1.05rem;
  font-weight: 800;
  line-height: 1.1;
  color: var(--text);
}
.book-title {
  font-size: 0.5rem;
  font-weight: 500;
  color: var(--text-light);
  line-height: 1.15;
  margin-top: 1px;
  text-align: center;
  width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 1px;
}

/* 활성 (재생 중) */
.book-btn.playing-musical {
  border-color: var(--primary);
  background: var(--primary-light);
}
.book-btn.playing-musical .book-num { color: var(--primary); }

.book-btn.playing-narration {
  border-color: var(--secondary);
  background: var(--secondary-light);
}
.book-btn.playing-narration .book-num { color: #3A9CC0; }

/* 비활성 (음원 없음) */
.book-btn.disabled {
  opacity: 0.45;
  cursor: default;
  box-shadow: none;
}
.book-btn.disabled:active { transform: none; }
.book-btn.disabled .book-num { color: var(--disabled); }

/* ─── 반응형 ───────────────────────────────────── */
@media (min-width: 340px) {
  .book-grid { grid-template-columns: repeat(6, 1fr); }
}
@media (min-width: 390px) {
  .book-grid { grid-template-columns: repeat(7, 1fr); }
}
@media (min-width: 520px) {
  .book-grid { grid-template-columns: repeat(8, 1fr); }
  .book-btn { min-height: 48px; padding: 6px 2px 5px; }
  .book-num { font-size: 1.1rem; }
}
@media (min-width: 768px) {
  .app { max-width: 700px; padding: 12px 12px 80px; }
  .book-grid { grid-template-columns: repeat(10, 1fr); }
  .book-btn { min-height: 52px; padding: 7px 3px 5px; }
  .book-num { font-size: 1.15rem; }
  .book-title { font-size: 0.55rem; }
}
@media (min-width: 1024px) {
  .app { max-width: 900px; }
  .book-grid { grid-template-columns: repeat(12, 1fr); }
}

/* ─── 다크모드 (시스템 설정 따름) ───────────────── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1E1A16;
    --card-bg: #2A2520;
    --text: #F0E6D8;
    --text-light: #A89880;
    --disabled: #4A4540;
    --shadow: 0 1px 4px rgba(0,0,0,0.25);
    --shadow-active: 0 1px 2px rgba(0,0,0,0.3);
    --primary-light: #3D2820;
    --secondary-light: #1A2E38;
  }
}
</style>

</div>

let currentTab = "musical";
let currentBook = null;
let isRepeat = false;
let isShuffle = false;

const audioEl = document.getElementById("audio");
const grid = document.getElementById("book-grid");

/* ─── 초기화 ───────────────────────────────────── */
renderGrid();

/* ─── 탭 전환 ──────────────────────────────────── */
function switchTab(tab) {
  currentTab = tab;

  const mBtn = document.getElementById("tab-musical");
  const nBtn = document.getElementById("tab-narration");

  mBtn.className = "tab-btn" + (tab === "musical" ? " active-musical" : "");
  nBtn.className = "tab-btn" + (tab === "narration" ? " active-narration" : "");

  renderGrid();
  updatePlayerInfo();
}

/* ─── 그리드 렌더링 ────────────────────────────── */
function renderGrid() {
  const urls = audioData[currentTab] || {};
  grid.innerHTML = "";

  BOOKS.forEach((book) => {
    const url = urls[String(book.no)];
    const btn = document.createElement("button");
    btn.className = "book-btn";

    // 재생 중인 버튼 강조
    if (currentBook === book.no) {
      btn.classList.add("playing-" + currentTab);
    }

    // 음원 없으면 비활성
    if (!url) {
      btn.classList.add("disabled");
    }

    btn.innerHTML =
      '<span class="book-num">' + book.no + "</span>" +
      '<span class="book-title">' + book.title + "</span>";

    if (url) {
      btn.onclick = () => playBook(book.no);
    }

    grid.appendChild(btn);
  });
}

/* ─── 재생 ─────────────────────────────────────── */
function playBook(no) {
  const url = (audioData[currentTab] || {})[String(no)];
  if (!url) return;

  currentBook = no;
  audioEl.src = url;
  audioEl.play();

  renderGrid();
  updatePlayerInfo();
}

/* ─── 플레이어 정보 갱신 ───────────────────────── */
function updatePlayerInfo() {
  const info = document.getElementById("player-info");

  if (currentBook === null) {
    info.innerHTML = '<span class="player-placeholder">책 번호를 눌러 재생하세요</span>';
    return;
  }

  const book = BOOKS.find((b) => b.no === currentBook);
  if (!book) return;

  const catLabel = currentTab === "musical" ? "뮤지컬동화" : "구연동화";
  const badgeClass = currentTab === "musical" ? "musical" : "narration";

  info.innerHTML =
    '<span class="player-badge ' + badgeClass + '">' + book.no + "</span>" +
    '<div class="player-meta">' +
    '<div class="player-category">' + catLabel + "</div>" +
    '<div class="player-title">' + book.title + "</div>" +
    "</div>";
}

/* ─── 반복 재생 ────────────────────────────────── */
function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById("btn-repeat").className = "ctrl-btn" + (isRepeat ? " on" : "");
}

/* ─── 랜덤 재생 ────────────────────────────────── */
function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById("btn-shuffle").className = "ctrl-btn" + (isShuffle ? " on" : "");
}

/* ─── 다음 곡 결정 (재생 끝났을 때) ─────────────── */
function getAvailableBooks() {
  const urls = audioData[currentTab] || {};
  return BOOKS.filter((b) => !!urls[String(b.no)]);
}

audioEl.addEventListener("ended", () => {
  const available = getAvailableBooks();
  if (available.length === 0) return;

  if (isShuffle) {
    // 랜덤: 현재 곡 제외하고 랜덤 선택
    const others = available.filter((b) => b.no !== currentBook);
    const pool = others.length > 0 ? others : available;
    const next = pool[Math.floor(Math.random() * pool.length)];
    playBook(next.no);
  } else if (isRepeat) {
    // 반복: 현재 곡 다시 재생
    audioEl.currentTime = 0;
    audioEl.play();
  }
  // 둘 다 아니면 그냥 정지
});
</script>
